<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { 
            background: #000; color: white; font-family: -apple-system; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        /* The "Apple" Card Style */
        .card {
            width: 300px; height: 400px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; backface-visibility: hidden;
        }
        .back { transform: rotateY(180deg); color: #0071e3; font-weight: bold; }
        
        button {
            margin-top: 30px; padding: 15px 30px; border-radius: 20px;
            border: none; background: #0071e3; color: white; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">
        <div class="front">
            <h2>What is Overfitting?</h2>
            <p>(Tap to reveal)</p>
        </div>
        <div class="back">
            <p>When a model learns the "noise" in training data too well and fails on new data.</p>
        </div>
    </div>

    <button onclick="nextCard()">Next Topic</button>

    <script>
        const topics = [
            {q: "What is a Neuron?", a: "The basic unit of a neural network that processes input."},
            {q: "What is ReLU?", a: "An activation function that outputs input directly if positive."},
            {q: "What is Supervised Learning?", a: "Training a model on labeled data (Input + Correct Answer)."}
        ];
        let index = 0;

        function nextCard() {
            index = (index + 1) % topics.length;
            const card = document.getElementById('card');
            card.classList.remove('is-flipped');
            setTimeout(() => {
                document.querySelector('.front h2').innerText = topics[index].q;
                document.querySelector('.back p').innerText = topics[index].a;
            }, 300);
        }
    </script>
</body>
</html>
